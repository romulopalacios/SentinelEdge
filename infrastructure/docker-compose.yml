# ─────────────────────────────────────────────
#  SENTINELEDGE — Full Stack
#  Infraestructura + Microservicios
# ─────────────────────────────────────────────

networks:
  perimetral-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:

services:

  # ──────────────────────────────────────────
  # PostgreSQL + TimescaleDB
  # ──────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: perimetral_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-perimetral_db}
      POSTGRES_USER: ${POSTGRES_USER:-perimetral_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perimetral_pass}
      TIMESCALEDB_TELEMETRY: "off"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-perimetral_user} -d ${POSTGRES_DB:-perimetral_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      perimetral-net:
        ipv4_address: 172.20.0.10
    labels:
      - "com.perimetral.service=postgres"
      - "com.perimetral.tier=infrastructure"

  # ──────────────────────────────────────────
  # RabbitMQ — Event Bus
  # ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: perimetral_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-perimetral_rmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-perimetral_rmq_pass}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-perimetral}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      perimetral-net:
        ipv4_address: 172.20.0.11
    labels:
      - "com.perimetral.service=rabbitmq"
      - "com.perimetral.tier=infrastructure"

  # ──────────────────────────────────────────
  # Redis — Cache, Sessions, Rate Limiting
  # ──────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: perimetral_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      perimetral-net:
        ipv4_address: 172.20.0.12
    labels:
      - "com.perimetral.service=redis"
      - "com.perimetral.tier=infrastructure"

  # ──────────────────────────────────────────
  # Nginx — API Gateway
  # ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: perimetral_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      auth-service:
        condition: service_healthy
      query-api-service:
        condition: service_healthy
      alert-service:
        condition: service_healthy
    networks:
      perimetral-net:
        ipv4_address: 172.20.0.13
    labels:
      - "com.sentineledge.service=nginx"
      - "com.sentineledge.tier=infrastructure"

  # ──────────────────────────────────────────
  # Mosquitto — MQTT Broker
  # ──────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: perimetral_mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t '$$SYS/health' -m ok -u ${MQTT_USERNAME:-sentinel_ingestion} -P ${MQTT_PASSWORD:-change_me_mqtt_password} || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      perimetral-net:
        ipv4_address: 172.20.0.14
    labels:
      - "com.sentineledge.service=mosquitto"
      - "com.sentineledge.tier=infrastructure"

  # ══════════════════════════════════════════
  # MICROSERVICIOS
  # ══════════════════════════════════════════

  # ──────────────────────────────────────────
  # Auth Service (Node.js)
  # ──────────────────────────────────────────
  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: perimetral_auth
    restart: unless-stopped
    env_file: ../.env
    environment:
      PORT: ${AUTH_SERVICE_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-perimetral_user}:${POSTGRES_PASSWORD:-perimetral_pass}@postgres:5432/${POSTGRES_DB:-perimetral_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${AUTH_SERVICE_PORT:-3001}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      perimetral-net:
        ipv4_address: 172.20.1.10
    labels:
      - "com.sentineledge.service=auth-service"
      - "com.sentineledge.tier=application"

  # ──────────────────────────────────────────
  # Ingestion Service (Python)
  # ──────────────────────────────────────────
  ingestion-service:
    build:
      context: ../services/ingestion-service
      dockerfile: Dockerfile
    container_name: perimetral_ingestion
    restart: unless-stopped
    env_file: ../.env
    environment:
      PORT: ${INGESTION_SERVICE_PORT:-8001}
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_USERNAME: ${MQTT_USERNAME:-sentinel_ingestion}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change_me_mqtt_password}
      MQTT_TOPIC_WILDCARD: ${MQTT_TOPIC_WILDCARD:-sentineledge/+/sensors/+/events}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-perimetral_rmq}:${RABBITMQ_PASS:-change_me_rmq_password}@rabbitmq:5672/${RABBITMQ_VHOST:-perimetral}
      DATABASE_URL: postgresql://${POSTGRES_USER:-perimetral_user}:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/${POSTGRES_DB:-perimetral_db}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${INGESTION_SERVICE_PORT:-8001}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      perimetral-net:
        ipv4_address: 172.20.1.11
    labels:
      - "com.sentineledge.service=ingestion-service"
      - "com.sentineledge.tier=application"

  # ──────────────────────────────────────────
  # Rule Engine Service (Python)
  # ──────────────────────────────────────────
  rule-engine-service:
    build:
      context: ../services/rule-engine-service
      dockerfile: Dockerfile
    container_name: perimetral_rule_engine
    restart: unless-stopped
    env_file: ../.env
    environment:
      PORT: ${RULE_ENGINE_SERVICE_PORT:-8002}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-perimetral_rmq}:${RABBITMQ_PASS:-change_me_rmq_password}@rabbitmq:5672/${RABBITMQ_VHOST:-perimetral}
      DATABASE_URL: postgresql://${POSTGRES_USER:-perimetral_user}:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/${POSTGRES_DB:-perimetral_db}
      REDIS_URL: redis://redis:6379
      RULE_CACHE_TTL_SECONDS: ${RULE_CACHE_TTL_SECONDS:-60}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${RULE_ENGINE_SERVICE_PORT:-8002}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      perimetral-net:
        ipv4_address: 172.20.1.12
    labels:
      - "com.sentineledge.service=rule-engine-service"
      - "com.sentineledge.tier=application"

  # ──────────────────────────────────────────
  # Alert Service (Node.js)
  # ──────────────────────────────────────────
  alert-service:
    build:
      context: ../services/alert-service
      dockerfile: Dockerfile
    container_name: perimetral_alert
    restart: unless-stopped
    env_file: ../.env
    environment:
      PORT: ${ALERT_SERVICE_PORT:-3002}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-perimetral_rmq}:${RABBITMQ_PASS:-change_me_rmq_password}@rabbitmq:5672/${RABBITMQ_VHOST:-perimetral}
      DATABASE_URL: postgresql://${POSTGRES_USER:-perimetral_user}:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/${POSTGRES_DB:-perimetral_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-development}
      # ── Notification channels (optional — all gracefully skipped if empty) ──
      ALERT_EMAIL_RECIPIENT: ${ALERT_EMAIL_RECIPIENT:-}
      ALERT_WEBHOOK_URL:     ${ALERT_WEBHOOK_URL:-}
      SLACK_WEBHOOK_URL:     ${SLACK_WEBHOOK_URL:-}
      SMTP_HOST:             ${SMTP_HOST:-}
      SMTP_PORT:             ${SMTP_PORT:-587}
      SMTP_SECURE:           ${SMTP_SECURE:-false}
      SMTP_USER:             ${SMTP_USER:-}
      SMTP_PASS:             ${SMTP_PASS:-}
      SMTP_FROM:             ${SMTP_FROM:-alerts@sentineledge.local}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${ALERT_SERVICE_PORT:-3002}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      perimetral-net:
        ipv4_address: 172.20.1.13
    labels:
      - "com.sentineledge.service=alert-service"
      - "com.sentineledge.tier=application"

  # ──────────────────────────────────────────
  # Query API Service (Python)
  # ──────────────────────────────────────────
  query-api-service:
    build:
      context: ../services/query-api-service
      dockerfile: Dockerfile
    container_name: perimetral_query_api
    restart: unless-stopped
    env_file: ../.env
    environment:
      PORT: ${QUERY_API_SERVICE_PORT:-8003}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-perimetral_rmq}:${RABBITMQ_PASS:-change_me_rmq_password}@rabbitmq:5672/${RABBITMQ_VHOST:-perimetral}
      DATABASE_URL: postgresql://${POSTGRES_USER:-perimetral_user}:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/${POSTGRES_DB:-perimetral_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      DEFAULT_PAGE_SIZE: ${DEFAULT_PAGE_SIZE:-50}
      MAX_PAGE_SIZE: ${MAX_PAGE_SIZE:-500}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${QUERY_API_SERVICE_PORT:-8003}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      perimetral-net:
        ipv4_address: 172.20.1.14
    labels:
      - "com.sentineledge.service=query-api-service"
      - "com.sentineledge.tier=application"
