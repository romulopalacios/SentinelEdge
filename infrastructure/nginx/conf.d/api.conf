# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Virtual Host principal  |  Perimetral API
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── CORS Global ───────────────────────────────────────────────────────────
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$") {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Correlation-ID, X-Tenant-ID" always;
    add_header Access-Control-Expose-Headers    "X-Correlation-ID, X-Request-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "no-referrer"     always;

    # ── Health check del gateway ──────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    # ── Auth Service ──────────────────────────────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_req zone=global_limit burst=50 nodelay;

        proxy_pass         http://auth_service/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    location /api/v1/users/ {
        limit_req zone=global_limit burst=50 nodelay;
        limit_req zone=tenant_limit burst=200 nodelay;

        proxy_pass         http://auth_service/api/v1/users/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    # ── Query API Service (eventos, alertas, sensores) ────────────────────────
    location /api/v1/events {
        limit_req zone=global_limit  burst=200 nodelay;
        limit_req zone=tenant_limit  burst=500 nodelay;

        proxy_pass         http://query_api_service/api/v1/events;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    location /api/v1/events/ {
        limit_req zone=global_limit  burst=200 nodelay;
        limit_req zone=tenant_limit  burst=500 nodelay;

        proxy_pass         http://query_api_service/api/v1/events/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    location /api/v1/alerts {
        limit_req zone=global_limit  burst=200 nodelay;
        limit_req zone=tenant_limit  burst=500 nodelay;

        proxy_pass         http://query_api_service/api/v1/alerts;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    location /api/v1/alerts/ {
        limit_req zone=global_limit  burst=200 nodelay;
        limit_req zone=tenant_limit  burst=500 nodelay;

        proxy_pass         http://query_api_service/api/v1/alerts/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    location /api/v1/sensors {
        limit_req zone=global_limit burst=100 nodelay;

        proxy_pass         http://query_api_service/api/v1/sensors;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    location /api/v1/sensors/ {
        limit_req zone=global_limit burst=100 nodelay;

        proxy_pass         http://query_api_service/api/v1/sensors/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    location /api/v1/rules {
        limit_req zone=global_limit burst=50 nodelay;

        proxy_pass         http://query_api_service/api/v1/rules;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    location /api/v1/rules/ {
        limit_req zone=global_limit burst=50 nodelay;

        proxy_pass         http://query_api_service/api/v1/rules/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    # ── Alert Service WebSocket (real-time) ───────────────────────────────────
    location /ws/ {
        proxy_pass          http://alert_service/ws/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── SPA — React UI ────────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
