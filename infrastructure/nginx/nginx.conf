# ─────────────────────────────────────────────────────────────────────────────
# Nginx — API Gateway  |  Perimetral Security Platform
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'x-corr=$http_x_correlation_id '
                    'tenant=$http_x_tenant_id';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    # Por IP general
    limit_req_zone  $binary_remote_addr zone=global_limit:10m rate=100r/s;
    # Por tenant (X-Tenant-ID header)
    limit_req_zone  $http_x_tenant_id   zone=tenant_limit:20m rate=500r/s;
    # Autenticación (protección fuerza bruta)
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m   rate=10r/m;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream auth_service {
        server auth-service:3001;
        keepalive 32;
    }

    upstream query_api_service {
        server query-api-service:8003;
        keepalive 64;
    }

    upstream alert_service {
        server alert-service:3002;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
