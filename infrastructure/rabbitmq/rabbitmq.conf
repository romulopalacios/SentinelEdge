# ─────────────────────────────────────────────────────────────────────────────
# RabbitMQ Configuration — Perimetral Security Platform
# ─────────────────────────────────────────────────────────────────────────────

# Cargar definiciones de exchanges/queues/bindings al iniciar
load_definitions = /etc/rabbitmq/definitions.json

# Logging
log.console           = true
log.console.level     = info
log.file              = false

# Heartbeat y conexión
heartbeat             = 60
connection_max        = 10000

# Límites de memoria y disco
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute          = 2GB

# Persistencia por defecto
default_vhost         = perimetral
queue_master_locator  = min-masters

# Management plugin
management.tcp.port   = 15672

# Consumer acknowledgement
consumer_timeout      = 300000
