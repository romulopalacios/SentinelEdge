# ─────────────────────────────────────────────────────────────────────────────
# Redis Configuration — Perimetral Security Platform
# ─────────────────────────────────────────────────────────────────────────────

# Binding
bind 0.0.0.0
protected-mode no
port 6379

# Autenticación (sobreescrita en producción)
# requirepass change_me_in_production

# Persistencia
# AOF: mejor durabilidad para rate-limiting y sesiones
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshot de respaldo
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Memoria
maxmemory 512mb
maxmemory-policy allkeys-lru

# Lazy expiration (no bloquea el event loop)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Keyspace notifications (para TTL expirado → rate limiting)
notify-keyspace-events "Ex"

# Logging
loglevel notice
logfile ""

# Bases de datos lógicas separadas por uso:
# DB 0 → sesiones / refresh tokens
# DB 1 → rate limiting
# DB 2 → cache de queries
# DB 3 → estado de alertas (open count por tenant)
databases 16
